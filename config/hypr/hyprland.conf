# Catppuccin Mocha palette
source=~/.config/hypr/mocha.conf

exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
$mod=SUPER
animations {
  bezier=emphasizedDecel, 0.05, 0.7, 0.1, 1
  bezier=emphasizedAccel, 0.3, 0, 0.8, 0.15
  bezier=standardDecel, 0, 0, 0, 1
  bezier=menuDecel, 0.1, 1, 0, 1
  bezier=menuAccel, 0.52, 0.03, 0.72, 0.08
  bezier=stall, 1, -0.1, 0.7, 0.85
  animation=windowsIn, 1, 3, emphasizedDecel, popin 80%
  animation=fadeIn, 1, 3, emphasizedDecel
  animation=windowsOut, 1, 2, emphasizedDecel, popin 90%
  animation=fadeOut, 1, 2, emphasizedDecel
  animation=windowsMove, 1, 3, emphasizedDecel, slide
  animation=border, 1, 10, emphasizedDecel
  animation=layersIn, 1, 2.7, emphasizedDecel, popin 93%
  animation=layersOut, 1, 2.4, menuAccel, popin 94%
  animation=fadeLayersIn, 1, 0.5, menuDecel
  animation=fadeLayersOut, 1, 2.7, stall
  animation=workspaces, 1, 7, menuDecel, slide
  animation=specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert
  animation=specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
  enabled=true
}

binds {
  scroll_event_delay=0
}

cursor {
  hotspot_padding=1
  zoom_factor=1
  zoom_rigid=false
}

decoration {
  blur {
    brightness=1
    contrast=0.890000
    enabled=true
    new_optimizations=true
    noise=0.050000
    passes=3
    popups=false
    popups_ignorealpha=0.600000
    size=10
    special=false
    vibrancy=0.500000
    vibrancy_darkness=0.500000
    xray=true
  }

  shadow {
    color=rgba(00000027)
    enabled=true
    ignore_window=true
    offset=0 4
    range=50
    render_power=10
  }
  dim_inactive=true
  dim_special=0.070000
  dim_strength=0.050000
  rounding=18
  rounding_power=2.400000
}

dwindle {
  preserve_split=true
  smart_resizing=false
  smart_split=false
}

general {
  snap {
    enabled=true
    monitor_gap=5
    window_gap=4
  }
  allow_tearing=true
  border_size=1
  col.active_border=rgba($rosewaterAlpha39)
  col.inactive_border=rgba($overlay0Alpha30)
  gaps_in=4
  gaps_out=5
  no_focus_fallback=true
  resize_on_border=true
}

gestures {
  workspace_swipe_cancel_ratio=0.200000
  workspace_swipe_create_new=true
  workspace_swipe_direction_lock=true
  workspace_swipe_min_speed_to_force=5
}

input {
  touchpad {
    clickfinger_behavior=true
    disable_while_typing=true
    middle_button_emulation=false
    natural_scroll=true
    scroll_factor=0.700000
    tap-to-click=true
    tap_button_map=lrm
  }
  accel_profile=adaptive
  follow_mouse=1
  kb_layout=se
  numlock_by_default=true
  repeat_delay=250
  repeat_rate=35
  sensitivity=0.200000
}

misc {
  allow_session_lock_restore=true
  animate_manual_resizes=false
  animate_mouse_windowdragging=false
  disable_hyprland_logo=true
  disable_splash_rendering=true
  enable_swallow=false
  focus_on_activate=true
  initial_workspace_tracking=false
  key_press_enables_dpms=true
  mouse_move_enables_dpms=true
  swallow_regex=(foot|kitty|alacritty|Alacritty)
  vfr=true
  vrr=1
}
bind=$mod, RETURN, exec, kitty
bind=$mod, T, exec, kitty
bind=$mod, D, exec, rofi -show drun
bind=$mod, E, exec, nautilus
bind=$mod, W, exec, google-chrome-stable
bind=$mod, C, exec, code
bind=CTRL+$mod, V, exec, pavucontrol
bind=$mod, Q, killactive
bind=ALT, F4, killactive
bind=$mod SHIFT ALT, Q, exec, hyprctl kill
bind=$mod, F, fullscreen, 0
bind=$mod, M, fullscreen, 1
bind=$mod ALT, Space, togglefloating
bind=$mod, P, pin
bind=$mod, Left, movefocus, l
bind=$mod, Right, movefocus, r
bind=$mod, Up, movefocus, u
bind=$mod, Down, movefocus, d
bind=$mod, BracketLeft, movefocus, l
bind=$mod, BracketRight, movefocus, r
bind=$mod SHIFT, Left, movewindow, l
bind=$mod SHIFT, Right, movewindow, r
bind=$mod SHIFT, Up, movewindow, u
bind=$mod SHIFT, Down, movewindow, d
bind=$mod, code:10, workspace, 1
bind=$mod, code:11, workspace, 2
bind=$mod, code:12, workspace, 3
bind=$mod, code:13, workspace, 4
bind=$mod, code:14, workspace, 5
bind=$mod, code:15, workspace, 6
bind=$mod, code:16, workspace, 7
bind=$mod, code:17, workspace, 8
bind=$mod, code:18, workspace, 9
bind=$mod, code:19, workspace, 10
bind=$mod ALT, code:10, movetoworkspacesilent, 1
bind=$mod ALT, code:11, movetoworkspacesilent, 2
bind=$mod ALT, code:12, movetoworkspacesilent, 3
bind=$mod ALT, code:13, movetoworkspacesilent, 4
bind=$mod ALT, code:14, movetoworkspacesilent, 5
bind=$mod ALT, code:15, movetoworkspacesilent, 6
bind=$mod ALT, code:16, movetoworkspacesilent, 7
bind=$mod ALT, code:17, movetoworkspacesilent, 8
bind=$mod ALT, code:18, movetoworkspacesilent, 9
bind=$mod ALT, code:19, movetoworkspacesilent, 10
bind=CTRL+$mod, Right, workspace, r+1
bind=CTRL+$mod, Left, workspace, r-1
bind=$mod, Page_Down, workspace, +1
bind=$mod, Page_Up, workspace, -1
bind=$mod, mouse_up, workspace, +1
bind=$mod, mouse_down, workspace, -1
bind=$mod SHIFT, mouse_down, movetoworkspace, r-1
bind=$mod SHIFT, mouse_up, movetoworkspace, r+1
bind=$mod SHIFT, Page_Down, movetoworkspace, r+1
bind=$mod SHIFT, Page_Up, movetoworkspace, r-1
bind=CTRL+$mod SHIFT, Right, movetoworkspace, r+1
bind=CTRL+$mod SHIFT, Left, movetoworkspace, r-1
bind=$mod, S, togglespecialworkspace
bind=$mod ALT, S, movetoworkspacesilent, special
bind=$mod SHIFT, S, exec, hyprshot --freeze --clipboard-only --mode region --silent
bind=$mod SHIFT, C, exec, hyprpicker -a
bind=$mod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind=$mod SHIFT, X, exec, grim -g "$(slurp)" /tmp/ocr.png && tesseract /tmp/ocr.png stdout | wl-copy && rm /tmp/ocr.png
bind=$mod, L, exec, loginctl lock-session
bind=$mod SHIFT, E, exit
bind=CTRL+SHIFT+ALT+$mod, Delete, exec, systemctl poweroff
bind=$mod ALT, F, fullscreenstate, 0 3
bind=CTRL ALT, T, exec, kitty
binde=$mod, Semicolon, splitratio, -0.1
binde=$mod, Apostrophe, splitratio, +0.1
bindel=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+ -l 1.5
bindel=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindel=, XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel=, XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindl=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindl=$mod SHIFT, M, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindl=, XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl=$mod ALT, M, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl=, XF86AudioPlay, exec, playerctl play-pause
bindl=, XF86AudioPause, exec, playerctl play-pause
bindl=, XF86AudioNext, exec, playerctl next
bindl=, XF86AudioPrev, exec, playerctl previous
bindl=$mod SHIFT, N, exec, playerctl next
bindl=$mod SHIFT, B, exec, playerctl previous
bindl=$mod SHIFT, P, exec, playerctl play-pause
bindl=, Print, exec, grim - | wl-copy
bindl=CTRL, Print, exec, mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/Screenshot_$(date '+%Y-%m-%d_%H.%M.%S').png
bindl=$mod SHIFT, L, exec, systemctl suspend || loginctl suspend
bindm=$mod, mouse:272, movewindow
bindm=$mod, mouse:273, resizewindow
exec-once=noctalia-shell
exec-once=swww-daemon
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store
exec-once=systemctl --user start hyprpolkitagent
exec-once=hyprctl dispatch dpms on
exec-once=hypridle
exec-once=hyprctl setcursor Bibata-Modern-Classic 24
exec-once=easyeffects --hide-window
gesture=3, horizontal, workspace
monitor=,preferred,auto,1
windowrule=float, title:^(Save File)$
windowrule=float, title:^(Open File)$
windowrule=float, title:^(Open File)(.*)$
windowrule=float, title:^(Select a File)$
windowrule=float, title:^(Choose File)$
windowrule=float, title:^(Save As)$
windowrule=float, title:^(Open Folder)(.*)$
windowrule=float, title:^(File Upload)(.*)$
windowrule=float, title:^(Library)(.*)$
windowrule=float, class:^(google-chrome)$, title:^(Save As)$
windowrule=float, class:^(google-chrome)$, title:^(Open)$
windowrule=center, title:^(Save File|Open File|Select a File|Choose File|Save As|Open Folder|File Upload|Library)(.*)$
windowrule=size 800 600, title:^(Save File|Open File|Select a File|Choose File|Save As|Open Folder|File Upload|Library)(.*)$
windowrule=float, class:^(xdg-desktop-portal-gtk)$
windowrule=size 900 600, class:^(xdg-desktop-portal-gtk)$
windowrule=float, class:^(pavucontrol)$
windowrule=size 45% 45%, class:^(pavucontrol)$
windowrule=center, class:^(pavucontrol)$
windowrule=float, class:^(org.pulseaudio.pavucontrol)$
windowrule=size 45% 45%, class:^(org.pulseaudio.pavucontrol)$
windowrule=center, class:^(org.pulseaudio.pavucontrol)$
windowrule=float, class:^(nm-connection-editor)$
windowrule=size 45% 45%, class:^(nm-connection-editor)$
windowrule=center, class:^(nm-connection-editor)$
windowrule=float, class:^(blueberry.py)$
windowrule=float, title:^([Pp]icture[-s]?[Ii]n[-s]?[Pp]icture)(.*)$
windowrule=keepaspectratio, title:^([Pp]icture[-s]?[Ii]n[-s]?[Pp]icture)(.*)$
windowrule=pin, title:^([Pp]icture[-s]?[Ii]n[-s]?[Pp]icture)(.*)$
windowrule=size 25% 25%, title:^([Pp]icture[-s]?[Ii]n[-s]?[Pp]icture)(.*)$
windowrule=move 73% 72%, title:^([Pp]icture[-s]?[Ii]n[-s]?[Pp]icture)(.*)$
windowrule=immediate, title:.*.exe
windowrule=immediate, class:^(steam_app).*
workspace=special:special, gapsout:30
